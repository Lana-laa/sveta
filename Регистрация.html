<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINUM - Регистрация</title>
    <link rel="stylesheet" href="Регистрация.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="header-overlay">
            <h1 class="logo-main">VINUM</h1>
        </div>
    </header>

    <main class="registration-container">
        <h2>Регистрация</h2>
        <form class="reg-form" id="regForm">
            <input type="text" placeholder="Имя пользователя" required>
            <input type="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Пароль" required>
            <input type="password" id="confirm_pass" placeholder="Подтверждение пароля" required>
            
            <div class="button-group">
                <button type="submit" class="btn btn-action">Создать</button>
                <a href="Войти.html" class="btn btn-action">Уже есть аккаунт</a>
            </div>
        </form>
    </main>

    <footer class="footer">
        <div class="footer-accent-bar">
            <div class="container">
                <div class="barcode-box">
                    <div class="barcode-lines">|||| || ||| || ||||</div>
                    <div class="barcode-text">V I N U M</div>
                </div>
            </div>
        </div>
        
        <div class="footer-main">
            <div class="container">
                <div class="footer-flex">
                    <div class="contacts">
                        <h3>Контакты</h3>
                        <p><i class="fab fa-telegram-plane"></i> @VINUM</p>
                        <p><i class="fas fa-phone-alt"></i> +375 33 349 931</p>
                    </div>
                    <div class="social-links">
                        <a href="https://www.instagram.com/"><i class="fab fa-instagram"></i></a>
                        <a href="https://vk.com/"><i class="fab fa-vk"></i></a>
                        <a href="https://www.facebook.com/"><i class="fab fa-facebook-square"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Скрипт по аналогии с формой входа
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('confirm_pass').value;

            if (pass !== confirm) {
                alert("Пароли не совпадают!");
                return;
            }

            // Переход в личный кабинет после успешной проверки
            window.location.href = "Личный кабинет.html"; 
        });
    </script>

</body>
</html>
