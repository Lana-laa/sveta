<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINUM - Вход</title>
    <link rel="stylesheet" href="Войти.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h1 class="logo-main">VINUM</h1>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-container">
            <h2 class="login-title">Войти</h2>
            <form class="login-form" id="loginForm">
                <input type="text" placeholder="Имя пользователя" class="login-input" required>
                <input type="email" placeholder="Email" class="login-input" required>
                <input type="password" placeholder="Пароль" class="login-input" required>
                
                <div class="button-group">
                    <button type="submit" class="btn-action">Войти</button>
                    <a href="Регистрация.html" class="btn-action">Регистрация</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-accent-bar">
            <div class="container">
                <div class="barcode-box">
                    <div class="barcode-lines">|||| || ||| || ||||</div>
                    <div class="barcode-text">V I N U M</div>
                </div>
            </div>
        </div>
        
        <div class="footer-main">
            <div class="container">
                <div class="footer-flex">
                    <div class="contacts">
                        <h3>Контакты</h3>
                        <p><i class="fab fa-telegram-plane"></i> @VINUM</p>
                        <p><i class="fas fa-phone-alt"></i> +375 33 349 931</p>
                    </div>
                    <div class="social-links">
                       <a href="https://www.instagram.com/"><i class="fab fa-instagram"></i></a>
                       <a href="https://vk.com/"><i class="fab fa-vk"></i></a>
                       <a href="https://www.facebook.com/"><i class="fab fa-facebook-square"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            window.location.href = "Личный кабинет.html"; 
        });
    </script>

</body>
</html>
